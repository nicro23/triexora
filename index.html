<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TriExora — Türkiye ⇄ Gulf Trade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-950:#06071f;
    --ink-900:#0a0e2d;
    --ink-800:#121a44;
    --ink-700:#1a2456;
    --gold-500:#00d8fc;      /* cyan — primary accent, matches the logo's arrow & "E" */
    --gold-300:#7ce9ff;      /* light cyan — hover state */
    --teal-500:#8b3ffa;      /* violet — secondary accent, matches globe/swoosh */
    --teal-300:#c79bff;      /* light violet */
    --pink-500:#f02ecb;      /* magenta — gradient accent, matches swoosh tail */
    --blue-500:#2f6bf2;      /* mid blue — gradient midpoint */
    --paper-100:#eef1fb;
    --slate-400:#96a2c9;
    --slate-600:#5c6690;
    --radius-lg:22px;
    --radius-md:14px;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --brand-gradient:linear-gradient(95deg, #00d8fc 0%, #2f6bf2 35%, #8b3ffa 68%, #f02ecb 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--ink-950);
    color:var(--paper-100);
    font-family:var(--font-body);
    line-height:1.6;
    overflow-x:hidden;
  }
  body.lang-ar{--font-display:'Cairo', sans-serif;--font-body:'Cairo', sans-serif;}
  body.lang-ar .eyebrow, body.lang-ar .mono{font-family:'Cairo',sans-serif;letter-spacing:0;}
  img,svg{display:block;max-width:100%;}
  a{color:inherit;text-decoration:none;}
  ul{list-style:none;}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea{font:inherit;color:inherit;}

  .wrap{max-width:1180px;margin-inline:auto;padding-inline:28px;}
  section{position:relative;padding-block:clamp(64px,9vw,120px);}

  .eyebrow{
    font-family:var(--font-mono);
    font-size:12.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold-300);
    display:flex;align-items:center;gap:10px;
    margin-bottom:18px;
  }
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--gold-500);}
  [dir="rtl"] .eyebrow::before{order:2;}

  h1,h2,h3{font-family:var(--font-display);font-weight:600;letter-spacing:-.01em;}
  .lang-ar h1,.lang-ar h2,.lang-ar h3{font-weight:700;letter-spacing:0;}

  /* ---------- NAV ---------- */
  header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(13,21,38,.82);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(47,107,242,.16);
  }
  nav.wrap{
    display:flex;align-items:center;justify-content:space-between;
    height:76px;
  }
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.01em;}
  .logo img{width:38px;height:auto;flex-shrink:0;}
  .logo-text{background:var(--brand-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}
  footer .logo img{width:26px;}
  .nav-links{display:flex;gap:34px;align-items:center;}
  .nav-links a{font-size:14.5px;color:var(--slate-400);transition:color .2s;}
  .nav-links a:hover{color:var(--paper-100);}
  .nav-right{display:flex;align-items:center;gap:18px;}
  .lang-switch{display:flex;gap:2px;background:var(--ink-800);border-radius:999px;padding:3px;border:1px solid rgba(47,107,242,.18);}
  .lang-switch button{
    padding:6px 13px;border-radius:999px;font-size:12.5px;font-family:var(--font-mono);
    color:var(--slate-400);transition:.2s;
  }
  .lang-switch button.active{background:var(--gold-500);color:var(--ink-950);font-weight:600;}
  .cta-btn{
    background:var(--gold-500);color:var(--ink-950);font-weight:600;font-size:14px;
    padding:11px 22px;border-radius:999px;white-space:nowrap;transition:transform .2s, background .2s;
  }
  .cta-btn:hover{background:var(--gold-300);transform:translateY(-1px);}
  .cta-ghost{
    border:1px solid rgba(243,238,225,.28);color:var(--paper-100);
    padding:11px 22px;border-radius:999px;font-size:14px;font-weight:500;transition:.2s;
  }
  .cta-ghost:hover{border-color:var(--gold-500);color:var(--gold-300);}
  .burger{display:none;width:26px;height:20px;position:relative;}
  .burger span{position:absolute;left:0;right:0;height:2px;background:var(--paper-100);transition:.25s;}
  .burger span:nth-child(1){top:0;}
  .burger span:nth-child(2){top:9px;}
  .burger span:nth-child(3){top:18px;}
  .burger.open span:nth-child(1){transform:translateY(9px) rotate(45deg);}
  .burger.open span:nth-child(2){opacity:0;}
  .burger.open span:nth-child(3){transform:translateY(-9px) rotate(-45deg);}

  /* ---------- HERO ---------- */
  .hero{padding-top:calc(76px + clamp(56px,8vw,96px));overflow:hidden;}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;}
  .hero-badge{width:64px;height:auto;margin-bottom:20px;filter:drop-shadow(0 0 22px rgba(0,216,252,.35));}
  .hero h1{font-size:clamp(34px,4.6vw,58px);line-height:1.08;color:var(--paper-100);}
  .hero h1 em{
    font-style:normal;
    background:var(--brand-gradient);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hero p.lead{margin-top:22px;font-size:17px;color:var(--slate-400);max-width:46ch;}
  .hero .actions{display:flex;gap:14px;margin-top:34px;flex-wrap:wrap;}
  .tagline-strip{
    margin-top:44px;display:flex;gap:26px;font-family:var(--font-mono);font-size:12.5px;
    color:var(--slate-400);flex-wrap:wrap;
  }
  .tagline-strip span{color:var(--gold-300);}

  .route-art{position:relative;}
  .route-art svg{width:100%;height:auto;}
  .route-art .node-label{font-family:var(--font-mono);font-size:11px;fill:var(--slate-400);}
  .route-art .node-label.hub{fill:var(--gold-300);font-weight:600;}
  .route-line{fill:none;stroke:url(#lineGrad);stroke-width:1.6;stroke-linecap:round;
    stroke-dasharray:700;stroke-dashoffset:700;animation:draw 2.6s ease forwards .3s;}
  @keyframes draw{to{stroke-dashoffset:0;}}
  .node-dot{fill:var(--ink-950);stroke:var(--gold-500);stroke-width:1.6;}
  .node-dot.hub{fill:var(--gold-500);stroke:none;r:6;}
  @media (prefers-reduced-motion: reduce){
    .route-line{animation:none;stroke-dashoffset:0;}
  }

  /* ---------- MANIFEST TICKER ---------- */
  .ticker{
    border-top:1px solid rgba(47,107,242,.16);
    border-bottom:1px solid rgba(47,107,242,.16);
    background:var(--ink-900);
    padding-block:14px;overflow:hidden;white-space:nowrap;
  }
  .ticker-track{display:inline-flex;gap:48px;animation:scroll 32s linear infinite;}
  .ticker-track span{
    font-family:var(--font-mono);font-size:12.5px;color:var(--slate-400);
    display:inline-flex;align-items:center;gap:10px;
  }
  .ticker-track span::before{content:"◆";color:var(--gold-500);font-size:8px;}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @media (prefers-reduced-motion: reduce){.ticker-track{animation:none;}}

  /* ---------- PILLARS ---------- */
  .pillars-head{max-width:640px;}
  .pillars-head h2{font-size:clamp(26px,3.2vw,38px);margin-top:4px;}
  .pillar-grid{margin-top:52px;display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .pillar-card{
    background:linear-gradient(160deg,var(--ink-800),var(--ink-900));
    border:1px solid rgba(47,107,242,.16);
    border-radius:var(--radius-lg);
    padding:32px 28px;
    transition:transform .25s, border-color .25s;
  }
  .pillar-card:hover{transform:translateY(-4px);border-color:rgba(47,107,242,.4);}
  .pillar-num{font-family:var(--font-mono);font-size:12px;color:var(--gold-500);letter-spacing:.1em;}
  .pillar-card h3{font-size:22px;margin-top:14px;color:var(--paper-100);}
  .pillar-card p{margin-top:12px;font-size:14.5px;color:var(--slate-400);}

  /* ---------- SERVICES ---------- */
  .services-section{background:var(--ink-900);}
  .service-grid{margin-top:52px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(47,107,242,.16);border:1px solid rgba(47,107,242,.16);border-radius:var(--radius-lg);overflow:hidden;}
  .service-card{background:var(--ink-950);padding:30px 26px;transition:background .25s;}
  .service-card:hover{background:var(--ink-800);}
  .service-icon{width:34px;height:34px;color:var(--teal-300);}
  .service-card h3{font-size:17px;margin-top:16px;color:var(--paper-100);font-family:var(--font-body);font-weight:600;}
  .lang-ar .service-card h3{font-family:var(--font-display);}
  .service-card p{margin-top:10px;font-size:13.8px;color:var(--slate-400);}

  /* ---------- ROUTES ---------- */
  .routes-grid{margin-top:52px;display:grid;grid-template-columns:1fr 1fr;gap:60px;}
  .route-col h4{font-family:var(--font-mono);font-size:12px;color:var(--gold-300);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px;}
  .route-list li{
    display:flex;justify-content:space-between;align-items:center;
    padding-block:16px;border-top:1px solid rgba(47,107,242,.16);font-size:16px;
  }
  .route-list li:last-child{border-bottom:1px solid rgba(47,107,242,.16);}
  .route-list li span.code{font-family:var(--font-mono);font-size:12px;color:var(--slate-600);}

  /* ---------- PROCESS ---------- */
  .process-section{background:var(--ink-900);}
  .process-grid{margin-top:52px;display:grid;grid-template-columns:repeat(4,1fr);gap:22px;position:relative;}
  .process-card{position:relative;padding-top:14px;}
  .process-card .step-no{
    font-family:var(--font-mono);font-size:34px;color:transparent;
    -webkit-text-stroke:1px var(--gold-500);
  }
  .process-card h3{font-size:18px;margin-top:14px;color:var(--paper-100);}
  .process-card p{margin-top:10px;font-size:13.8px;color:var(--slate-400);}
  .process-card::after{
    content:"";position:absolute;top:20px;inset-inline-start:calc(100% + 11px);width:22px;height:1px;
    background:repeating-linear-gradient(90deg,var(--gold-500) 0 6px,transparent 6px 10px);
  }
  .process-card:last-child::after{display:none;}

  /* ---------- CONTACT ---------- */
  .contact-grid{margin-top:52px;display:grid;grid-template-columns:1fr 1fr;gap:60px;}
  .contact-info h4{font-family:var(--font-mono);font-size:12px;color:var(--gold-300);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .contact-info .big{font-size:20px;color:var(--paper-100);margin-bottom:28px;}
  .contact-link{display:inline-block;transition:color .2s;}
  .contact-link:hover{color:var(--gold-500);}
  .phone-row{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
  .phone-row .big{margin-bottom:0;}
  .whatsapp-link{
    width:34px;height:34px;border-radius:50%;
    background:rgba(0,216,252,.12);border:1px solid rgba(47,107,242,.35);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    color:var(--gold-500);transition:.2s;
  }
  .whatsapp-link svg{width:18px;height:18px;}
  .whatsapp-link:hover{background:var(--gold-500);color:var(--ink-950);transform:translateY(-1px);}
  .contact-info .offices{margin-top:30px;font-size:14.5px;color:var(--slate-400);line-height:1.9;}
  form{display:flex;flex-direction:column;gap:16px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  label{font-size:12.5px;color:var(--slate-400);margin-bottom:6px;display:block;font-family:var(--font-mono);}
  input,textarea{
    width:100%;background:var(--ink-900);border:1px solid rgba(47,107,242,.2);
    border-radius:10px;padding:13px 15px;font-size:14.5px;color:var(--paper-100);
    transition:border-color .2s;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--gold-500);}
  textarea{resize:vertical;min-height:100px;}
  .submit-note{font-size:13px;color:var(--slate-600);margin-top:4px;}

  /* ---------- FOOTER ---------- */
  footer{border-top:1px solid rgba(47,107,242,.16);padding-block:44px;}
  .footer-grid{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;}
  .footer-tag{font-size:13px;color:var(--slate-600);}
  .footer-links{display:flex;gap:24px;}
  .footer-links a{font-size:13.5px;color:var(--slate-400);}
  .footer-links a:hover{color:var(--gold-300);}
  .social-links{display:flex;gap:10px;}
  .social-links a{
    width:36px;height:36px;border-radius:50%;
    background:rgba(0,216,252,.08);border:1px solid rgba(47,107,242,.3);
    display:flex;align-items:center;justify-content:center;
    color:var(--slate-400);transition:.2s;
  }
  .social-links svg{width:17px;height:17px;}
  .social-links a:hover{
    color:var(--ink-950);background:var(--brand-gradient);border-color:transparent;
    transform:translateY(-2px);
  }
  @media (max-width:560px){
    .footer-grid{flex-direction:column;align-items:flex-start;}
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:920px){
    .nav-links{display:none;}
    .burger{display:block;}
    .hero-grid{grid-template-columns:1fr;}
    .pillar-grid{grid-template-columns:1fr;}
    .service-grid{grid-template-columns:1fr;}
    .routes-grid{grid-template-columns:1fr;gap:36px;}
    .process-grid{grid-template-columns:1fr 1fr;}
    .process-card::after{display:none;}
    .contact-grid{grid-template-columns:1fr;}
    .form-row{grid-template-columns:1fr;}
  }
  @media (max-width:560px){
    .process-grid{grid-template-columns:1fr;}
    .cta-ghost{display:none;}
  }

  /* mobile nav drawer */
  #mobileMenu{
    position:fixed;inset:76px 0 0 0;background:var(--ink-950);z-index:90;
    display:none;flex-direction:column;padding:32px 28px;gap:22px;
  }
  #mobileMenu.open{display:flex;}
  #mobileMenu a{font-size:20px;font-family:var(--font-display);}
</style>
</head>

let currentLang = 'ar';

function applyLang(lang){
  currentLang = lang;
  const c = content[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.body.className = 'lang-' + lang;

  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(c[key] !== undefined) el.innerHTML = c[key];
  });

  document.querySelectorAll('.lang-switch button').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });

  // services
  const services = [
    ['s1_t','s1_d'],['s2_t','s2_d'],['s3_t','s3_d'],
    ['s4_t','s4_d'],['s5_t','s5_d'],['s6_t','s6_d']
  ];
  const icons = [
    '<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
    '<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 4h11l5 5v11H4z"/><path d="M15 4v5h5"/><path d="M8 13h8M8 17h5"/></svg>',
    '<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 16V7a1 1 0 011-1h9v10"/><path d="M13 10h4l3 3v3h-7"/><circle cx="7" cy="18" r="2"/><circle cx="18" cy="18" r="2"/></svg>',
    '<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>',
    '<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 21V10l9-6 9 6v11"/><path d="M9 21v-6h6v6"/></svg>',
    '<svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 19V9M10 19V5M16 19v-8M22 19H2"/></svg>'
  ];
  const grid = document.getElementById('serviceGrid');
  grid.innerHTML = services.map((s,i)=>`
    <div class="service-card">
      ${icons[i]}
      <h3>${c[s[0]]}</h3>
      <p>${c[s[1]]}</p>
    </div>`).join('');

  // origin / destination lists
  const origins = [['o1','o1c'],['o2','o2c'],['o3','o3c'],['o4','o4c']];
  const dests = [['d1','d1c'],['d2','d2c'],['d3','d3c'],['d4','d4c'],['d5','d5c'],['d6','d6c']];
  document.getElementById('originList').innerHTML = origins.map(o=>`<li>${c[o[0]]}<span class="code">${c[o[1]]}</span></li>`).join('');
  document.getElementById('destList').innerHTML = dests.map(d=>`<li>${c[d[0]]}<span class="code">${c[d[1]]}</span></li>`).join('');

  // process
  const steps = [['p1_t','p1_d'],['p2_t','p2_d'],['p3_t','p3_d'],['p4_t','p4_d']];
  document.getElementById('processGrid').innerHTML = steps.map((s,i)=>`
    <div class="process-card">
      <div class="step-no">0${i+1}</div>
      <h3>${c[s[0]]}</h3>
      <p>${c[s[1]]}</p>
    </div>`).join('');

  // ticker
  const codes = [
    `${c.map_hub} → ${c.map_1}`, `${c.map_hub} → ${c.map_2}`, `${c.map_hub} → ${c.map_3}`,
    `${c.map_hub} → ${c.map_4}`, `${c.map_hub} → ${c.map_5}`, `${c.map_hub} → ${c.map_6}`
  ];
  const tickerHTML = codes.map(t=>`<span>${t}</span>`).join('');
  document.getElementById('tickerTrack').innerHTML = tickerHTML + tickerHTML;

  document.getElementById('submitNote').textContent = c.submit_note;

  const waText = encodeURIComponent(c.wa_message);
  const waHref = `https://wa.me/96899688620?text=${waText}`;
  document.getElementById('ctaNav').href = waHref;
  document.getElementById('ctaHero').href = waHref;
  document.querySelector('.whatsapp-link').href = waHref;

  document.querySelectorAll('#f_name').forEach(el=>el.placeholder = c.form_name);
  document.getElementById('f_company').placeholder = c.form_company;
  document.getElementById('f_country').placeholder = c.form_country;
  document.getElementById('f_sourcing').placeholder = c.form_sourcing;
  document.getElementById('f_message').placeholder = c.form_message;
}

document.querySelectorAll('.lang-switch button').forEach(btn=>{
  btn.addEventListener('click', ()=> applyLang(btn.getAttribute('data-lang')));
});

document.getElementById('burgerBtn').addEventListener('click', function(){
  this.classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
});
document.querySelectorAll('#mobileMenu a').forEach(a=>{
  a.addEventListener('click', ()=>{
    document.getElementById('burgerBtn').classList.remove('open');
    document.getElementById('mobileMenu').classList.remove('open');
  });
});

document.getElementById('contactForm').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('f_name').value;
  const company = document.getElementById('f_company').value;
  const country = document.getElementById('f_country').value;
  const sourcing = document.getElementById('f_sourcing').value;
  const message = document.getElementById('f_message').value;
  const subject = encodeURIComponent('TriExora — ' + (sourcing || 'Inquiry'));
  const body = encodeURIComponent(
    `Name: ${name}\nCompany: ${company}\nCountry: ${country}\nSourcing: ${sourcing}\n\n${message}`
  );
  window.location.href = `mailto:info@triexora.com?subject=${subject}&body=${body}`;
});

applyLang('ar');
</script>
